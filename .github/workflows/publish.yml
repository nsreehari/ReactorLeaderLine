name: publish

# Publishes the NuGet package when a version tag is pushed, e.g.:
#   git tag v0.1.0-preview.1
#   git push origin v0.1.0-preview.1
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest

    permissions:
      contents: read
      id-token: write  # required for Trusted Publishing (OIDC token issuance)

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Derive version from tag
        id: version
        shell: bash
        # Strips the leading "v" from the tag (v0.1.0-preview.1 -> 0.1.0-preview.1)
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/Reactor.Community.LeaderLine/Reactor.Community.LeaderLine.csproj --configuration Release --no-build --output artifacts -p:Version=${{ steps.version.outputs.version }}

      - name: NuGet login (OIDC -> short-lived API key)
        uses: NuGet/login@v1
        id: login
        with:
          # Your nuget.org username (profile name), NOT your email address.
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        shell: bash
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: artifacts/*.nupkg
